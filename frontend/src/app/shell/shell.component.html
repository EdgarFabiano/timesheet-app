<mat-sidenav-container class="shell-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <h3>Timesheet App</h3>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      @if (isAdmin()) {
        <a mat-list-item routerLink="/clients" routerLinkActive="active">
          <mat-icon matListItemIcon>business</mat-icon>
          <span matListItemTitle>Clients</span>
        </a>
        <a mat-list-item routerLink="/projects" routerLinkActive="active">
          <mat-icon matListItemIcon>folder</mat-icon>
          <span matListItemTitle>Projects</span>
        </a>
        <a mat-list-item routerLink="/employees" routerLinkActive="active">
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle>Employees</span>
        </a>
      }
      @if (!isAdmin()) {
        <a mat-list-item routerLink="/timesheets" routerLinkActive="active">
          <mat-icon matListItemIcon>schedule</mat-icon>
          <span matListItemTitle>Timesheets</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Timesheet App</span>
      <span class="spacer"></span>
      @if (currentUser()) {
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-trigger">
          <span>{{ currentUser()?.email }}</span>
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu" class="user-dropdown">
          <button mat-menu-item>
            <mat-slide-toggle 
              [checked]="isDarkMode()" 
              (change)="toggleTheme()"
              (click)="$event.stopPropagation()">
              Dark Mode
            </mat-slide-toggle>
          </button>
          <button mat-menu-item disabled>
            <mat-icon>email</mat-icon>
            <span>{{ currentUser()?.email }}</span>
          </button>
          <button mat-menu-item disabled>
            <mat-icon>badge</mat-icon>
            <span>{{ currentUser()?.role }}</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      }
    </mat-toolbar>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
